<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    
    <main>
        <form action="#" method="post">
            <div class="content">
                <div class="singUp">
                    <h1>Sign Up</h1>
                </div>
                <fieldset>
                    <legend><span class="number">1 </span> Your Basic Info</legend>
                    <div class="name">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required autofocus>
                    </div>  
                    <div class="email">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="password">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="age">
                        <label for="age">Age: </label>
                        <label for="under13">
                            <input type="radio" id="under13" name="age">
                            Under 13
                        </label>
                        <label for="over13">
                            <input type="radio" id="over13" name="age">
                            Over 13
                        </label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend><span class="number">2 </span> Your Profile</legend>
                    <div class="bio">
                        <label for="bio">Bio:</label>
                        <textarea id="bio" name="bio"></textarea>
                    </div>
                    <div class="job">
                        <label for="job">Job Role:</label>
                        <select id="job" name="job">
                            <optgroup label="Web">
                                <option>Front-End Developer</option>
                                <option>PHP Developer</option>
                                <option>Python Developer</option>
                                <option>Rails Developer</option>
                                <option>Web Designer</option>
                                <option>Wordpress Developer</option>
                            </optgroup>
                            <optgroup label="Mobile">
                                <option>Android Developer</option>
                                <option>IOS Developer</option>
                                <option>Mobile Designer</option>
                            </optgroup>
                            <optgroup label="Business">
                                <option>Business Owner</option>
                                <option>Freelancer</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="Interest">
                        <label for="interest">Interests:</label>
                        <label for="development">
                            <input type="checkbox" id="development" name="interest">
                            Development
                        </label>
                        <label for="design">
                            <input type="checkbox" id="design" name="interest">
                            Design
                        </label>
                        <label for="business">
                            <input type="checkbox" id="business" name="interest">
                            Business
                        </label>
                    </div>
                </fieldset>    
                <div class="button-area">
                    <button type="submit">Submit</button>
                </div>
            </div>
        </form>
    </main>

</body>
</html>
